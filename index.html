<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理商仪表板 / Agent Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}
.header{background:#1F3864;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{color:#fff;font-size:20px;font-weight:600}
.header-sub{color:#C9A84C;font-size:12px;margin-top:3px}
.week-tabs{display:flex;gap:6px;flex-wrap:wrap}
.wtab{font-size:11px;font-weight:500;padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);background:transparent;cursor:pointer;transition:all .2s}
.wtab:hover{border-color:rgba(255,255,255,.6);color:#fff}
.wtab.on{background:#fff;color:#1F3864;border-color:#fff}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8eaf0}
.kpi-l{font-size:11px;color:#888;margin-bottom:6px;font-weight:500}
.kpi-v{font-size:22px;font-weight:700;line-height:1.1}
.kpi-d{font-size:11px;color:#aaa;margin-top:4px}
.kpi-star{border:2px solid #534AB7;background:#faf9ff}
.kpi-star .kpi-l{color:#534AB7;font-weight:600}
.charts-top{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.charts-mid{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:16px}
.charts-bot{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e8eaf0}
.card-title{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
.card-sub{font-size:11px;color:#aaa;margin-bottom:12px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:#666}
.ld{display:flex;align-items:center;gap:5px}
.ls{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.agent-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.agent-table th{text-align:left;font-weight:600;font-size:11px;color:#888;padding:8px 10px;border-bottom:2px solid #f0f0f0}
.agent-table td{padding:9px 10px;border-bottom:1px solid #f5f5f5;color:#1a1a2e}
.agent-table tr:last-child td{border-bottom:none;font-weight:700;background:#fafafa}
.agent-table tr:hover td{background:#f8f9ff}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill-g{background:#e8f5e9;color:#2e7d32}
.pill-r{background:#ffebee;color:#c62828}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-bg{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;min-width:40px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.record-badge{display:inline-block;background:#534AB7;color:#fff;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.footer{text-align:center;padding:20px;font-size:12px;color:#bbb}
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-star{grid-column:1/-1}
  .charts-top,.charts-mid,.charts-bot{grid-template-columns:1fr}
  .header{padding:14px 16px}
  .main{padding:16px 12px}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">代理商仪表板 / Agent Dashboard</div>
    <div class="header-sub" id="hdr-sub">Mar 23 – May 17, 2026 · 8 weeks</div>
  </div>
  <div class="week-tabs">
    <button class="wtab" onclick="setW(1,this)">W1</button>

    <button class="wtab" onclick="setW(3,this)">W3</button>

<div class="main">
  <div class="kpi-row">

    <div class="kpi"><div class="kpi-l">总中奖</div><div class="kpi-v" id="k-win">—</div><div class="kpi-d" id="k-win-d">—</div></div>
    <div class="kpi"><div class="kpi-l">净利润</div><div class="kpi-v" id="k-profit">—</div><div class="kpi-d" id="k-profit-d">—</div></div>
    <div class="kpi"><div class="kpi-l">总佣金</div><div class="kpi-v" id="k-comm" style="color:#2e7d32">—</div><div class="kpi-d">已赚取</div></div>

  </div>
  <div class="charts-top">
    <div class="card">
      <div class="card-title">⭐ 赚取佣金+利润 趋势 <span id="record-badge"></span></div>
      <div class="card-sub">实际盈亏走势 W1 → W8</div>
      <div class="legend">
        <span class="ld"><span class="ls" style="background:#534AB7;border-radius:50%"></span>实际 P&L</span>
        <span class="ld"><span class="ls" style="background:#bbb;border-radius:50%"></span>净利润</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="c-trend"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">销售 vs 中奖</div>
      <div class="card-sub" id="sub-sv">各代理对比</div>
      <div class="legend">
        <span class="ld"><span class="ls" style="background:#185FA5"></span>销售</span>
        <span class="ld"><span class="ls" style="background:#c62828"></span>中奖</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="c-sv"></canvas></div>
    </div>
  </div>
  <div class="charts-mid">
    <div class="card">
      <div class="card-title">各代理详情</div>
      <div class="card-sub" id="sub-agents">—</div>
      <table class="agent-table">
        <thead><tr>
          <th style="width:22%">代理</th>
          <th style="width:16%;text-align:right">销售</th>
          <th style="width:16%;text-align:right">利润</th>
          <th style="width:22%;text-align:right">⭐ 赚取+利润</th>
          <th style="width:24%">销售占比</th>
        </tr></thead>
        <tbody id="agent-tbody"></tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-title">佣金占比</div>
      <div class="card-sub" id="sub-pie">各代理佣金</div>
      <div style="position:relative;height:170px"><canvas id="c-pie"></canvas></div>
      <div class="legend" id="pie-leg" style="margin-top:10px;justify-content:center"></div>
    </div>
  </div>
  <div class="charts-bot">
    <div class="card">
      <div class="card-title">各代理 P&L 周对比</div>
      <div class="card-sub">赚取佣金+利润 W1–W8</div>
      <div class="legend" id="agent-legend"></div>
      <div style="position:relative;height:200px"><canvas id="c-agent-pnl"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">各周总销售趋势</div>
      <div class="card-sub">W1 → W8 销售额</div>
      <div style="position:relative;height:200px"><canvas id="c-sales"></canvas></div>
    </div>
  </div>
</div>
<div class="footer">代理商周报系统 · 数据截至 May 17, 2026 · 每周更新</div>
<script>

const TREND={labels:["W1","W2","W3","W4","W5","W6","W7","W8"],pnl:[182.56,-276.84,800.28,-745.18,336.07,1229.74,1214.37,1485.76],profit:[121.96,-348.15,728.07,-882.55,206.76,1138.86,1128.65,1392.05]};

const SALES={labels:["W1","W2","W3","W4","W5","W6","W7","W8"],data:[352.3,747.3,1158.71,919.48,1018.40,1699.58,1777.63,2001.07]};
const PIE_C=["#185FA5","#2e7d32","#BA7517","#c62828"];
const WC=["#2e7d32","#185FA5","#c62828","#534AB7","#0F6E56","#BA7517","#8E44AD","#1A5276"];
const WL=["W1","W2","W3","W4","W5","W6","W7","W8"];
const fmt=v=>"RM "+(v<0?"-":"")+Math.abs(v).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0});

function getSvWin(w){
  const wins={1:[143,31.5,0,0],2:[938,0,33,0],3:[33,0,215,0],4:[1657.5,0,0,0],5:[438.5,84,143,0],6:[286,0,0,0],7:[323.4,33,0,0],8:[63,0,220,0]};

}

let charts={};
function destroyAll(){Object.values(charts).forEach(c=>c&&c.destroy());charts={};}
function buildAll(w){

  document.getElementById("k-win").textContent=fmt(d.win);

  }).join("")+`<tr><td>总额</td><td style="text-align:right">RM ${d.sales.toFixed(0)}</td>
    <td style="text-align:right"><span class="pill ${d.profit>=0?'pill-g':'pill-r'}">${d.profit>=0?'+':''}${d.profit.toFixed(0)}</span></td>

  charts.pie=new Chart(document.getElementById("c-pie"),{type:"doughnut",data:{labels:pie_l,datasets:[{data:comms,backgroundColor:PIE_C,borderWidth:3,borderColor:"#fff"}]},

  document.getElementById("pie-leg").innerHTML=pie_l.map((l,i)=>`<span class="ld"><span class="ls" style="background:${PIE_C[i]}"></span>${l} ${(comms[i]/total*100).toFixed(0)}%</span>`).join("");

  const wKeys=["w1","w2","w3","w4","w5","w6","w7","w8"];
  document.getElementById("agent-legend").innerHTML=WL.map((l,i)=>`<span class="ld"><span class="ls" style="background:${WC[i]}"></span>${l}</span>`).join("");
  charts.agentPnl=new Chart(document.getElementById("c-agent-pnl"),{type:"bar",data:{labels:AGENT_PNL.labels,datasets:wKeys.map((k,i)=>({label:WL[i],data:AGENT_PNL[k],backgroundColor:WC[i],borderRadius:3,barPercentage:.8}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+": "+fmt(c.raw)}}},
      scales:{x:{grid:{display:false},ticks:{color:"#aaa",font:{size:11}}},y:{grid:{color:"rgba(0,0,0,.05)"},ticks:{color:"#aaa",font:{size:10},callback:v=>(v<0?"-RM":"RM ")+Math.abs(v)}}}}});

  charts.sales=new Chart(document.getElementById("c-sales"),{type:"bar",data:{labels:SALES.labels,datasets:[{label:"销售额",data:SALES.data,
    backgroundColor:SALES.data.map((_,i)=>i===w-1?"#185FA5":i===7?"rgba(24,95,165,.5)":"rgba(24,95,165,.25)"),borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"RM "+c.raw.toFixed(0)}}},
      scales:{x:{grid:{display:false},ticks:{color:"#aaa",font:{size:11}}},y:{grid:{color:"rgba(0,0,0,.05)"},ticks:{color:"#aaa",font:{size:10},callback:v=>"RM "+v}}}}});
}
function setW(w,el){document.querySelectorAll(".wtab").forEach(b=>b.classList.remove("on"));el.classList.add("on");buildAll(w);}
buildAll(8);
</script>
